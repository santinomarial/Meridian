name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

permissions:
  contents: read

jobs:
  # ── Server: generate Prisma client, build, run unit tests ──────────────────
  # Unit tests mock PrismaService (jest-mock-extended), so no database is
  # needed here — only the generated client for types/enums.
  server:
    name: Server (build + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json
      # node-pty has no Linux prebuild, so it compiles from source on `npm ci`.
      # ubuntu-latest ships gcc/g++/make/python3, which node-gyp needs.
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: npm test

  # ── Client: typecheck + unit tests + production build ──────────────────────
  client:
    name: Client (typecheck + unit tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      # `tsc -b` is the real typecheck; the root tsconfig has files:[] so
      # `tsc --noEmit` alone compiles nothing.
      - run: npx tsc -b
      - run: npm test # vitest unit tests for pure logic (no backend needed)
      - run: npm run build

  # ── Server integration: real request lifecycle against Postgres + Redis ────
  # supertest drives the booted AppModule (ValidationPipe, JwtAuthGuard, the
  # throttler, the exception filter, real Prisma) — no port is bound.
  server-integration:
    name: Server (integration + multi-replica)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: meridian
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meridian?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-at-least-16-chars
      CLIENT_ORIGIN: http://localhost:5173
      # Deliberately NOT setting E2E_TEST: integration tests exercise the real
      # throttler and reject the test-only endpoints. Multi-replica specs boot
      # two AppModules against this shared Postgres + Redis.
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run test:integration
        # Includes dual-AppModule harness: restore-fencing, multi-replica
        # fan-out / seq catch-up / concurrent durable edits / pinned sockets.

  # ── End-to-end: real backend (Postgres + Redis + terminal) + Playwright ────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: meridian
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meridian?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-at-least-16-chars
      CLIENT_ORIGIN: http://localhost:5173
      # E2E_TEST relaxes rate limits and exposes the test-only cleanup endpoint;
      # ENABLE_TERMINAL turns on the PTY terminal the terminal/run specs need.
      E2E_TEST: "true"
      ENABLE_TERMINAL: "true"
      NODE_ENV: development
      MERIDIAN_BACKEND_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      # ── Backend ──────────────────────────────────────────────────────────
      - name: Install server deps
        working-directory: server
        run: npm ci
      - name: Apply database migrations
        working-directory: server
        run: npx prisma migrate deploy
      - name: Build server
        working-directory: server
        run: npm run build
      - name: Start backend
        working-directory: server
        run: |
          node dist/main.js > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/health > /dev/null; then
              echo "Backend is up."
              exit 0
            fi
            sleep 1
          done
          echo "::error::Backend failed to start within 60s"
          cat /tmp/server.log
          exit 1

      # ── Frontend + Playwright (Playwright starts the Vite dev server) ──────
      - name: Install client deps
        working-directory: client
        run: npm ci
      - name: Install Playwright browser
        working-directory: client
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: client
        run: npm run test:e2e

      - name: Dump backend log on failure
        if: failure()
        run: cat /tmp/server.log || true
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report
          retention-days: 7

  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint

  # ── Dependency vulnerability scan ────────────────────────────────────────
  security-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
      - name: Server npm audit (high+)
        working-directory: server
        run: npm ci && npm audit --omit=dev --audit-level=high
      - name: Client npm audit (high+)
        working-directory: client
        run: npm ci && npm audit --omit=dev --audit-level=high

  # ── Container image scan (production Dockerfiles) ────────────────────────
  container-scan:
    name: Container scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build API image
        run: docker build -t meridian-api:ci ./server
      - name: Build web image
        run: docker build -t meridian-web:ci ./client
      - name: Trivy API image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: meridian-api:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
      - name: Trivy web image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: meridian-web:ci
          severity: CRITICAL,HIGH
          exit-code: "1"

  # ── Backup script smoke test against integration Postgres ────────────────
  ops-backup:
    name: Backup/restore smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: meridian
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # PostgreSQL CLI tools reject Prisma's optional `schema` URL parameter.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meridian
      JWT_SECRET: ci-test-secret-at-least-16-chars
      CLIENT_ORIGIN: http://localhost:5173
      NODE_ENV: test
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: npm ci
      - run: npx prisma migrate deploy
      - name: Dump and restore round-trip
        run: |
          ./scripts/backup-pg.sh dump /tmp/meridian-ci.sql
          # Drop and recreate public schema, then restore
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c 'DROP SCHEMA public CASCADE; CREATE SCHEMA public;'
          ./scripts/backup-pg.sh restore /tmp/meridian-ci.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "SELECT 1 FROM \"_prisma_migrations\" LIMIT 1;"
