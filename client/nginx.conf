server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Same-origin public deploy (Caddy terminates TLS): connect-src defaults to 'self'.
  # Rebuild with CSP_CONNECT_SRC_EXTRA (leading space + origins) if the API is
  # cross-origin, e.g. " https://api.example.com wss://api.example.com".
  # HSTS belongs on Caddy, not here. __CSP_CONNECT_SRC_EXTRA__ is substituted
  # at image build time (see Dockerfile).
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'__CSP_CONNECT_SRC_EXTRA__; worker-src 'self' blob:;" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "DENY" always;
  # Preserve these server-level security headers in locations that add their
  # own cache headers. Supported by the pinned Nginx 1.31 runtime.
  add_header_inherit merge;

  location = /index.html {
    add_header Cache-Control "no-store";
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    add_header Cache-Control "public, max-age=604800, immutable" always;
  }
}
