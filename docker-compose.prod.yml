# Production Compose for Meridian (single API replica + Caddy TLS edge).
#
# Public VPS (recommended):
#   1. Copy .env.production.example → .env and fill secrets + DOMAIN
#   2. Point DNS A/AAAA at the VPS
#   3. docker compose -f docker-compose.prod.yml up --build -d
#
# Only Caddy publishes 80/443. Postgres, Redis, API, and SPA stay on the
# internal Compose network. Prefer one API replica for Socket.IO simplicity.
# See docs/operations.md § Public deploy.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: meridian
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian -d meridian"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Never publish Postgres to the host / public internet.
    expose:
      - "5432"

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Never publish Redis to the host / public internet.
    expose:
      - "6379"

  migrate:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://meridian:${POSTGRES_PASSWORD}@postgres:5432/meridian?schema=public
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:?set CLIENT_ORIGIN to https://YOUR_DOMAIN}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://meridian:${POSTGRES_PASSWORD}@postgres:5432/meridian?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_REQUIRED: "true"
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-prod:}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:?set CLIENT_ORIGIN to https://YOUR_DOMAIN}
      TRUST_PROXY: "1"
      METRICS_ENABLED: "true"
      ENABLE_TERMINAL: "false"
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # Internal only — Caddy is the public edge. Do not map 3000 to the host.
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Same-origin via Caddy: leave empty so the SPA uses window.location.origin.
        # Or set both to https://YOUR_DOMAIN explicitly.
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
        # Same-origin CSP ('self'). For a split API host, e.g.:
        # CSP_CONNECT_SRC_EXTRA= https://api.example.com wss://api.example.com
        CSP_CONNECT_SRC_EXTRA: ${CSP_CONNECT_SRC_EXTRA:-}
    # Internal only — reached through Caddy.
    expose:
      - "8080"
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN to your public hostname}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
